
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cybersecurity Controls Navigator</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="/logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <style>
      @import url('https://rsms.me/inter/inter.css');
      body {
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        background-color: #f8fafc;
        min-height: 100vh;
        transition: background-color 0.2s ease, color 0.2s ease;
      }
      html.dark body {
        background: #0F0F1A;
        background: linear-gradient(to bottom right, #0F0F1A, #1A1A2E);
      }
      
      /* Glassmorphism utility classes */
      .glass-panel {
        background: rgba(15, 23, 42, 0.03);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 12px;
        transition: background-color 0.2s ease, border-color 0.2s ease;
      }
      html.dark .glass-panel {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .glass-panel-hover:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.15);
      }

      /* Water Gel Transparent Buttons */
      .water-gel-btn {
        background: rgba(13, 148, 136, 0.08); /* transparent teal */
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(13, 148, 136, 0.2);
        color: #0f766e; /* teal-700 */
        font-weight: 500;
        border-radius: 10px;
        box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.3), 
                    0 2px 4px rgba(0, 0, 0, 0.03);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        cursor: pointer;
      }
      html.dark .water-gel-btn {
        background: rgba(45, 212, 191, 0.06); /* transparent teal-light */
        border: 1px solid rgba(45, 212, 191, 0.15);
        color: #2dd4bf; /* teal-400 */
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08),
                    0 2px 4px rgba(0, 0, 0, 0.12);
      }
      .water-gel-btn:hover:not(:disabled) {
        background: rgba(13, 148, 136, 0.16);
        border-color: rgba(13, 148, 136, 0.35);
        transform: translateY(-1px);
        box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.4),
                    0 6px 12px rgba(13, 148, 136, 0.12);
      }
      html.dark .water-gel-btn:hover:not(:disabled) {
        background: rgba(45, 212, 191, 0.12);
        border-color: rgba(45, 212, 191, 0.3);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15),
                    0 6px 12px rgba(45, 212, 191, 0.12);
      }
      .water-gel-btn:active:not(:disabled) {
        transform: translateY(1px);
        box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.1);
      }
      .water-gel-btn:disabled {
        background: rgba(156, 163, 175, 0.04);
        border-color: rgba(156, 163, 175, 0.1);
        color: rgba(156, 163, 175, 0.35);
        cursor: not-allowed;
        box-shadow: none;
      }

      #loading-indicator {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #0F0F1A;
      }
      #loading-indicator svg {
        width: 6rem; /* 96px */
        height: 6rem; /* 96px */
        color: #0d9488; /* teal-600 */
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      #loading-indicator p {
        margin-top: 1.5rem;
        font-size: 1rem; /* text-base */
        font-weight: 400; /* font-normal */
        color: #374151; /* text-gray-700 */
      }
      .dark #loading-indicator p {
        color: #d1d5db; /* dark:text-gray-300 */
      }
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }
    </style>
    <script>
      // Prevents flash of incorrect theme - Defaults to Dark
      if (localStorage.theme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/html-to-docx-ts@1.8.0/dist/browser/html-to-docx.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.16.0",
    "@clerk/clerk-react": "https://esm.sh/@clerk/clerk-react@5",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js",
    "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/"
  }
}
</script>
</head>
  <body class="selection:bg-cyan-500/30">
    <div id="root">
      <div id="loading-indicator">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M12 2L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-3z" />
        </svg>
        <p>Loading Cybersecurity Controls Navigator...</p>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
